Name: Generar APK de pollo abenturas

on:
  workflow_dispatch:

jobs:
  construir:
    runs-on: ubuntu-latest

    steps:
    - name: Configurar trabajo
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Instalar pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9  # Instala la versión de pnpm compatible con tu proyecto

    - name: Instalar Dependencias y Compilar
      run: |
        pnpm install
        pnpm run build --if-present

    - name: Configurar entorno de Android (Java 21)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Inicializar Capacitor y Configurar Android
      run: |
        pnpm add -g @capacitor/cli
        pnpm add @capacitor/core @capacitor/android
        npx cap init "Pollo Aventuras" "com.danis.polloaventuras" --web-dir=dist/public
        npx cap add android
        npx cap sync

    - name: Inyectar Permiso de Internet y Tráfico Libre en Android
      run: |
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" \/>' android/app/src/main/AndroidManifest.xml
        sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' android/app/src/main/AndroidManifest.xml
        echo "¡Permiso de Internet y Tráfico Libre inyectados con éxito!"

    - name: Forzar Versión de Kotlin (Evitar Clases Duplicadas)
      run: |
        echo "subprojects {
            configurations.all {
                resolutionStrategy {
                    eachDependency { details ->
                        if (details.requested.group == 'org.jetbrains.kotlin') {
                            details.useVersion('1.8.22')
                        }
                    }
                }
            }
        }" >> android/build.gradle

    - name: Crear APK
      run: |
        cd android && ./gradlew assembleDebug

    - name: Subir APK como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: apk-nueva-danis
        path: android/app/build/outputs/apk/debug/app-debug.apk
