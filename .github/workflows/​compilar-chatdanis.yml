name: Generar APK de pollo abenturas

on:
  workflow_dispatch:

jobs:
  construir:
    runs-on: ubuntu-latest

    steps:
    - name: Configurar trabajo
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Instalar pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Instalar Dependencias y Compilar
      run: |
        pnpm install --no-frozen-lockfile
        TSC_COMPILE_ON_ERROR=true pnpm run build --if-present

    - name: Configurar entorno de Android (Java 21)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Inicializar Capacitor y Configurar Android
      run: |
        pnpm add -g @capacitor/cli
        pnpm add @capacitor/core @capacitor/android
        npx cap init
